                </div>

                <div>

                            class="text-brand-red">*</span></label>

                <div class="text-center mt-4">
                    <a href="https://wa.me/573000000000"
                        class="text-xs text-gray-500 hover:text-brand-blue font-medium underline">¿Olvidaste tu
                        contraseña?</a>
                </div>
            </form>

        document.addEventListener('DOMContentLoaded', () => {
            const deptoSelect = document.getElementById('select-departamento');
            Object.keys(colombiaData).sort().forEach(depto => {
                const opt = new Option(depto, depto);
                deptoSelect.add(opt);
            });
        });

        function cargarCiudades() {
            const depto = document.getElementById('select-departamento').value;
            const lista = document.getElementById('lista-ciudades');
            lista.innerHTML = "";
            if (colombiaData[depto]) {
                colombiaData[depto].forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c;
                    lista.appendChild(opt);
                });
            }
        }

        // --- 4. ACCIONES ---
        async function iniciarSesion(event) {
            event.preventDefault();
            const wapp = document.getElementById('log-whatsapp').value;
            const pass = document.getElementById('log-password').value;

            const { error } = await supabaseApp.auth.signInWithPassword({
                email: wapp + "@guardianes.com",
                password: pass
            });

            if (error) alert("Error: " + error.message);
            else window.location.replace("inicio.html");
        }

        async function registrarVoluntario(event) {
            event.preventDefault();
            const btn = document.getElementById('btn-register');
            btn.disabled = true;
            btn.innerText = "Registrando...";

            const wapp = document.getElementById('reg-whatsapp').value;
            const pass = document.getElementById('reg-password').value;
            const areas = Array.from(document.querySelectorAll('.custom-checkbox:checked')).map(cb => cb.value);

            // A. Crear Usuario en Auth
            const { data: authData, error: authError } = await supabaseApp.auth.signUp({
                email: wapp + "@guardianes.com",
                password: pass
            });

            // B. Verificar si hubo error al crear cuenta (Ej: Usuario ya existe)
            if (authError) {
                alert("Error de registro: " + authError.message);
                btn.disabled = false;
                btn.innerText = "Crear mi cuenta";
                return;
            }

            // C. Si Auth funcionó, guardamos el perfil en la tabla voluntarios
            if (authData.user) {
                const { error: dbError } = await supabaseApp.from('voluntarios').insert([{
                    id: authData.user.id,
                    nombre: document.getElementById('reg-nombre').value,
                    whatsapp: wapp,
                    edad: parseInt(document.getElementById('reg-edad').value),
                    departamento: document.getElementById('select-departamento').value,
                    ciudad: document.getElementById('input-ciudad').value,
                    sector: document.getElementById('reg-sector').value,
                    profesion: document.getElementById('reg-profesion').value,
                    bandera_motivacion: document.getElementById('reg-bandera').value,
                    areas_aporte: areas,
                    tiempo_disponible: document.getElementById('reg-tiempo').value,
                    firmeza_apoyo: parseInt(document.querySelector('input[name="apoyo"]:checked')?.value || 1)
                }]);

                if (dbError) {
                    console.error("Error BD:", dbError);
                    alert("Cuenta creada pero hubo un problema guardando tus datos: " + dbError.message);
                } else {
                    alert("¡Registro exitoso!");
                    window.location.replace("inicio.html");
                }
            }

            btn.disabled = false;
            btn.innerText = "Crear mi cuenta";
        }
    </script>
